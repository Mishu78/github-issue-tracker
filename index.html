<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>
    <!--google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--tailwind daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="./style.css">
</head>
<body class="flex min-h-screen geist-normal items-center justify-center">
<!--login page-->
    <section class="mx-auto pb-3 overflow-hidden items-center justify-center w-full max-w-md bg-white shadow-2xl ">

        <div class="logo w-[65px] mx-auto pt-4">
    <img src="./assets/github-logo.png" alt="">
   </div> 
   <div class="text-center pt-2">
    <p class="text-2xl font-bold pb-2">Github Issues Tracker</p>
    <p class="text-lg text-gray-500">Sign in to manage your issues</p>
   </div>
   <div class="form pt-2">
  
    <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto pl-4 pr-4">
      <div class="">
        <fieldset class="fieldset">
          <label class="label text-sm font-bold  text-black">Username</label>
          <input id="input-name" type="email" class="input rounded-lg w-full" placeholder="Enter Username" />
          <p class="text-indigo-600">Default:admin</p>
          <label class="label text-sm font-bold  text-black">Password</label>
          <input id="input-password" type="password" class="input rounded-lg w-full" placeholder="Enter Password" />
          <p  class="text-indigo-600">Default: admin123</p>
          <button id="login-btn" class="btn btn-primary rounded-lg mt-4 w-full">Sign in</button>
        </fieldset>
      </div>
    </div>
    
   </div>

   <div class="flex pt-2 items-center mx-auto pl-7 pr-7">
    <hr class="w-1/2 mr-4 border-gray-400">
    <h2>OR</h2>
    <hr class="w-1/2 ml-4 border-gray-400">
   </div>

   <div class="text-center pt-2">
    <p class="text-gray-500">Demo Credentials:</p>
    <div class="bg-base-200 p-3">
     <p><span class="font-bold text-sm">Username:</span>admin</p>
     <p><span class="font-bold text-sm">Password:</span>admin123</p>
    </div>
   </div>
   
    </section>
   <script src="./scripts/script.js"></script>
</body>
</html>
