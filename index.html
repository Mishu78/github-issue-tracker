<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>
    <!--google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--tailwind daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="./style.css">
</head>
<body class="mx-auto min-h-screen max-w-md bg-base-200 geist-normal">
    <!--login page-->
   <div class="logo w-[200px] mx-auto pl-8 pt-32">
    <img src="./assets/github-logo.png" alt="">
   </div> 
   <div class="text-center pt-8">
    <p class="text-4xl font-bold pb-2">Github Issues Tracker</p>
    <p class="text-xl text-gray-500">Sign in to manage your issues</p>
   </div>
   <div class="form pt-10">
  
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Username</label>
          <input type="email" class="input" placeholder="Enter Username" />
          <p class="text-indigo-600">Default:admin</p>
          <label class="label">Password</label>
          <input type="password" class="input" placeholder="Enter Password" />
          <p  class="text-indigo-600">Default: admin123</p>
          <button class="btn btn-neutral mt-4">Sign in</button>
        </fieldset>
      </div>
    </div>
    
   </div>
   
</body>
</html>
