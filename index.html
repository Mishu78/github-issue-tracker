<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>
    <!--google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--tailwind daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="./style.css">
</head>
<body class="mx-auto min-h-screen max-w-md geist-normal mt-10 mb-10">
    <!--login page-->
    <section class="mx-auto min-h-screen overflow-hidden items-center justify-center max-w-md bg-white shadow-2xl">

        <div class="logo w-[200px] mx-auto pl-8 pt-32">
    <img src="./assets/github-logo.png" alt="">
   </div> 
   <div class="text-center pt-8">
    <p class="text-4xl font-bold pb-2">Github Issues Tracker</p>
    <p class="text-xl text-gray-500">Sign in to manage your issues</p>
   </div>
   <div class="form pt-10">
  
    <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-medium text-base text-black">Username</label>
          <input type="email" class="input rounded-lg" placeholder="Enter Username" />
          <p class="text-indigo-600">Default:admin</p>
          <label class="label font-medium text-base text-black">Password</label>
          <input type="password" class="input rounded-lg" placeholder="Enter Password" />
          <p  class="text-indigo-600">Default: admin123</p>
          <button class="btn btn-primary rounded-lg mt-4 w-full">Sign in</button>
        </fieldset>
      </div>
    </div>
    
   </div>

   <div class="flex pt-7 items-center mx-auto pl-7 pr-7">
    <hr class="w-1/2 mr-4 border-gray-400">
    <h2>OR</h2>
    <hr class="w-1/2 ml-4 border-gray-400">
   </div>

   <div class="text-center pt-5">
    <p class="text-gray-500">Demo Credentials:</p>
    <div class="bg-base-200 ml-7 mr-7 p-7 mt-4 mb-4">
     <p><span class="font-bold">Username:</span>admin</p>
     <p><span class="font-bold">Password:</span>admin123</p>
    </div>
   </div>
   
    </section>
   
</body>
</html>
